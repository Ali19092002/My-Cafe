            <h2><u>Contact Us</u></h2>

        <form>
            <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label">Email Address</label>
                <input type="email" placeholder="xxxxx@gmail.com" class="form-control" id="exampleInputEmail1"

                <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
            </div>
            <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label">Password</label>

                    id="exampleInputPassword1">
            </div>
            <div class="mb-3">
                <label for="exampleFormControlTextarea1" class="form-label">Give your Suggetions/Query</label>
                <textarea placeholder="Write here..." class="form-control" id="exampleFormControlTextarea1"
                    rows="3"></textarea>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="exampleCheck1">
                <label class="form-check-label" for="exampleCheck1">Remember me</label>
            </div>
            <div class="d-grid gap-2 col-6 mx-auto mb-3">
                <button type="submit" class="btn btn-outline-success">Submit</button>
            </div>
        </form>
